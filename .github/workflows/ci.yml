name: StellarVault CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build VaultLock
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts/vaultlock
      - name: Run VaultLock Tests
        run: cargo test
        working-directory: contracts/vaultlock
      - name: Build Analytics
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts/analytics
      - name: Run Analytics Tests
        run: cargo test
        working-directory: contracts/analytics

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install
        working-directory: frontend
      - name: Run Frontend Tests
        run: npm run test
        working-directory: frontend
